# Prometheus Configuration

global:
  scrape_interval: 15s        # How often to scrape targets
  evaluation_interval: 15s    # How often to evaluate rules

scrape_configs:

  # ─── Prometheus itself ──────────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ─── Node Exporter (host metrics) ──────────────────────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ─── cAdvisor (Docker container metrics) ───────────────────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # ─── Home Assistant liveness ────────────────────────────────────────────────
  # Scrapes HA's /api/prometheus only as an up/down signal (up{job="homeassistant"}
  # → Grafana "Home Assistant Down" alert). HA is host-networked on :8123, so from
  # this bridge container we reach it via host.docker.internal (extra_hosts in
  # docker-compose.yml). Auth: a DEDICATED non-admin monitoring long-lived token in
  # the gitignored credentials_file (NOT the CD token). HA filters out all entity
  # metrics (configuration.yaml prometheus: filter), so the payload is ~empty.
  - job_name: "homeassistant"
    scheme: http
    metrics_path: /api/prometheus
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/ha_monitoring_token
    static_configs:
      - targets: ["host.docker.internal:8123"]
