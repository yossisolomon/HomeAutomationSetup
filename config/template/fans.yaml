# ════════════════════════════════════════════════════════════════════════════
# TYPE B — balcony fan
# No separate on button — speed_1 = turn_on. No light on button — color = turn_on.
# Jinja: speed_{{ preset_mode }} same trick
# Light: color_temp slider → set_temperature → warm/natural/cool
# Brightness: set_level → compares to optimistic brightness → brighter or dimmer RF command
# Commands to learn: speed_1–5, speed_turbo, fan_off, direction,
#                    light_warm, light_cool, light_natural, light_off,
#                    light_brighter, light_dimmer
# ════════════════════════════════════════════════════════════════════════════

- fan:
  - name: "Balcony Left Fan"
    unique_id: fan_balcony_left
    preset_modes: &type_b_presets
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - turbo
    turn_on:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_left, command: speed_1}
    turn_off:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_left, command: fan_off}
    set_preset_mode:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_left, command: "speed_{{ preset_mode }}"}
    set_direction:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_left, command: direction}

  - name: "Balcony Right Fan"
    unique_id: fan_balcony_right
    preset_modes: *type_b_presets
    turn_on:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_right, command: speed_1}
    turn_off:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_right, command: fan_off}
    set_preset_mode:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_right, command: "speed_{{ preset_mode }}"}
    set_direction:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_right, command: direction}

# ─── Type B lights (color_temp slider → warm/natural/cool, brightness slider → brighter/dimmer) ──
- light:
  - name: "Balcony Left Fan Light"
    unique_id: light_fan_balcony_left
    turn_on:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_left, command: light_warm}
    turn_off:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_left, command: light_off}
    set_temperature:
      - choose:
          - conditions: "{{ color_temp_kelvin > 5000 }}"
            sequence:
              - action: remote.send_command
                target: *rm4
                data: {device: fan_balcony_left, command: light_cool}
          - conditions: "{{ color_temp_kelvin < 3500 }}"
            sequence:
              - action: remote.send_command
                target: *rm4
                data: {device: fan_balcony_left, command: light_warm}
        default:
          - action: remote.send_command
            target: *rm4
            data: {device: fan_balcony_left, command: light_natural}
    set_level:
      - choose:
          - conditions: "{{ brightness > state_attr(this.entity_id, 'brightness') | int(128) }}"
            sequence:
              - action: remote.send_command
                target: *rm4
                data: {device: fan_balcony_left, command: light_brighter}
        default:
          - action: remote.send_command
            target: *rm4
            data: {device: fan_balcony_left, command: light_dimmer}

  - name: "Balcony Right Fan Light"
    unique_id: light_fan_balcony_right
    turn_on:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_right, command: light_warm}
    turn_off:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_balcony_right, command: light_off}
    set_temperature:
      - choose:
          - conditions: "{{ color_temp_kelvin > 5000 }}"
            sequence:
              - action: remote.send_command
                target: *rm4
                data: {device: fan_balcony_right, command: light_cool}
          - conditions: "{{ color_temp_kelvin < 3500 }}"
            sequence:
              - action: remote.send_command
                target: *rm4
                data: {device: fan_balcony_right, command: light_warm}
        default:
          - action: remote.send_command
            target: *rm4
            data: {device: fan_balcony_right, command: light_natural}
    set_level:
      - choose:
          - conditions: "{{ brightness > state_attr(this.entity_id, 'brightness') | int(128) }}"
            sequence:
              - action: remote.send_command
                target: *rm4
                data: {device: fan_balcony_right, command: light_brighter}
        default:
          - action: remote.send_command
            target: *rm4
            data: {device: fan_balcony_right, command: light_dimmer}
