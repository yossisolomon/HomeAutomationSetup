# ════════════════════════════════════════════════════════════════════════════
# TYPE A — indoor ceiling fan
# Single toggle button for fan on/off. Single toggle button for light on/off.
# Fan remembers speed internally — speed buttons also serve as "turn on at speed N".
# Jinja: speed_{{ preset_mode }} → speed_1 … speed_6, speed_turbo
# Commands to learn: fan_toggle, speed_1–6, speed_turbo, direction, light_toggle
# ════════════════════════════════════════════════════════════════════════════

- fan:
  - name: "Dana's Office Fan"
    unique_id: fan_danas_office
    preset_modes: &type_a_presets
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "6"
      - turbo
    turn_on:
      - action: remote.send_command
        target: &rm4
          entity_id: remote.broadlink_main_ac_and_fans
        data: {device: fan_danas_office, command: fan_toggle}
    turn_off:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_danas_office, command: fan_toggle}
    set_preset_mode:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_danas_office, command: "speed_{{ preset_mode }}"}
    set_direction:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_danas_office, command: direction}

  - name: "Yossi's Office Fan"
    unique_id: fan_yossis_office
    preset_modes: *type_a_presets
    turn_on:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_yossis_office, command: fan_toggle}
    turn_off:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_yossis_office, command: fan_toggle}
    set_preset_mode:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_yossis_office, command: "speed_{{ preset_mode }}"}
    set_direction:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_yossis_office, command: direction}

  - name: "Master Bedroom Fan"
    unique_id: fan_master_bedroom
    preset_modes: *type_a_presets
    turn_on:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_master_bedroom, command: fan_toggle}
    turn_off:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_master_bedroom, command: fan_toggle}
    set_preset_mode:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_master_bedroom, command: "speed_{{ preset_mode }}"}
    set_direction:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_master_bedroom, command: direction}

  - name: "Mamad Fan"
    unique_id: fan_mamad
    preset_modes: *type_a_presets
    turn_on:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_mamad, command: fan_toggle}
    turn_off:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_mamad, command: fan_toggle}
    set_preset_mode:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_mamad, command: "speed_{{ preset_mode }}"}
    set_direction:
      - action: remote.send_command
        target: *rm4
        data: {device: fan_mamad, command: direction}

