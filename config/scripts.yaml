# meta: intent="Telegram CTA: choose open-window vs run central A/C on degraded air"; waf=med; mode=cta
climate_cta:
  alias: climate-cta-window-vs-ac
  use_blueprint:
    path: homeassistant/telegram_confirmable.yaml
    input:
      target_chat: !secret telegram_chat_id
      message: >-
        {# Self-explanatory + debuggable: shows the raw reading behind every decision so
           a wrong recommendation is traceable to the sensor that drove it. 'n/a' = the
           sensor is unavailable (so bad/stale data is visible, not silently treated as 0). #}
        {% set aqi_id = 'sensor.kmutzkin_begin_haifa_and_krayot_israel_yshrl_q_mvtsqyn_bgyn_khyph_vqryvt_air_quality_index' %}
        {% set temp_id = 'sensor.kmutzkin_begin_haifa_and_krayot_israel_yshrl_q_mvtsqyn_bgyn_khyph_vqryvt_temperature' %}
        {% set co2_map = {'living': 'sensor.airmonitor2_co2',
                          'master': 'sensor.airmonitorlitemaster_co2',
                          'mamad': 'sensor.mamadairmonitor_co2'} %}
        {% set pm_map = {'living': 'binary_sensor.living_air_bad',
                         'master': 'binary_sensor.master_air_bad',
                         'mamad': 'binary_sensor.mamad_air_bad'} %}
        {% set bad = ['unavailable', 'unknown', 'none'] %}
        {% set fav = is_state('binary_sensor.ventilate_favorable', 'on') %}
        {% set aqi_raw = states(aqi_id) %}
        {% set temp_raw = states(temp_id) %}
        {% set aqi = aqi_raw | float(-1) %}
        {% set otemp = temp_raw | float(-999) %}
        {% set aqi_max = states('input_number.outdoor_aqi_ventilate_max') | float(100) %}
        {% set tmax = states('input_number.ventilate_max_outdoor_temp') | float(26) %}
        {% set ns = namespace(co2=[], pm=[]) %}
        {% for area, eid in co2_map.items() %}
          {% set v = states(eid) %}
          {% set hi = v not in bad and v | float(0) >= 1400 %}
          {% set ns.co2 = ns.co2 + [area ~ ' ' ~ ('n/a' if v in bad else v) ~ (' ⚠️' if hi else '')] %}
        {% endfor %}
        {% for area, eid in pm_map.items() %}
          {% if is_state(eid, 'on') %}{% set ns.pm = ns.pm + [area] %}{% endif %}
        {% endfor %}
        {% set why = [] %}
        {% if not (aqi >= 0 and aqi <= aqi_max) %}{% set why = why + ['outdoor AQI not ok'] %}{% endif %}
        {% if not (otemp > -999 and otemp <= tmax) %}{% set why = why + ['too warm outside'] %}{% endif %}
        {% if is_state('binary_sensor.any_window_open', 'on') %}{% set why = why + ['a window is already open'] %}{% endif %}
        {% set lines = [
          '🏠 Indoor air degraded — suggest: ' ~ ('🪟 open a window' if fav else '❄️ run the A/C'),
          '',
          'CO2 (ppm, ⚠️ = ≥1400): ' ~ (ns.co2 | join(', ')),
          'High PM: ' ~ (ns.pm | join(', ') if ns.pm else 'none'),
          'Outside: AQI ' ~ (aqi_raw if aqi >= 0 else 'n/a') ~ ' (need ≤' ~ aqi_max | int ~ '), ' ~ (temp_raw if otemp > -999 else 'n/a') ~ '°C (need ≤' ~ tmax | int ~ ')',
          '',
          ('→ outside is clean & cool enough — ventilating beats the A/C.' if fav
           else '→ ' ~ (why | join('; ')) ~ ' — A/C is the better option.')
        ] %}
        {{ lines | join('\n') }}
      confirm_text: "❄️ Run A/C"
      confirm_action:
        # Temperature first: ar_smart_ir sends no IR while the unit is off, so this just
        # stores the setpoint. Then set mode — one IR carrying that temp (one beep, not
        # two). The blueprint posts the "✅ Run A/C" outcome, so no ack needed here.
        - action: climate.set_temperature
          target:
            entity_id: climate.smartir_climate_1581
          data:
            temperature: "{{ states('input_number.ac_cool_setpoint') | float(24) }}"
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.smartir_climate_1581
          data:
            hvac_mode: cool
      dismiss_text: "🪟 Open window"
      dismiss_action:
        # The blueprint posts the "✅ Open window" outcome; just stand the A/C down.
        - if:
            - condition: not
              conditions:
                - condition: state
                  entity_id: climate.smartir_climate_1581
                  state: "off"
          then:
            - action: climate.turn_off
              target:
                entity_id: climate.smartir_climate_1581

# meta: intent="Telegram CTA: a window opened while the central A/C runs — offer to turn the A/C off"; waf=low; mode=cta
climate_cta_window_ac:
  alias: climate-cta-window-ac-off-prompt
  use_blueprint:
    path: homeassistant/telegram_confirmable.yaml
    input:
      target_chat: !secret telegram_chat_id
      message: >-
        {% set wins = {'living balcony': 'binary_sensor.windowlivingroom_contact',
                       'office': 'binary_sensor.windowyossi_contact'} %}
        {% set ns = namespace(open=[]) %}
        {% for name, eid in wins.items() %}
          {% if is_state(eid, 'on') %}{% set ns.open = ns.open + [name] %}{% endif %}
        {% endfor %}
        {% set setpoint = states('input_number.ac_cool_setpoint') | int(24) %}
        {{ '🪟 ' ~ (ns.open | join(', ') if ns.open else 'A window') ~ ' open while the ❄️ A/C is running (set ' ~ setpoint ~ '°C). Turn the A/C off?' }}
      confirm_text: "❄️ Turn off A/C"
      confirm_action:
        - action: climate.turn_off
          target:
            entity_id: climate.smartir_climate_1581
      dismiss_text: "Keep it on"
      dismiss_action: []
