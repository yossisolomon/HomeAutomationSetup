
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ThinkPad T400 battery sensors (HA 2022.6+ command_line integration syntax)
# Reads directly from /sys/class/power_supply mounted in docker-compose.yml
command_line:
  - sensor:
      name: "ThinkPad Battery"
      unique_id: thinkpad_battery_capacity
      command: "cat /sys/class/power_supply/BAT0/capacity"
      unit_of_measurement: "%"
      device_class: battery
      scan_interval: 60

  - sensor:
      name: "ThinkPad Battery Status"
      unique_id: thinkpad_battery_status
      command: "cat /sys/class/power_supply/BAT0/status"
      scan_interval: 60
