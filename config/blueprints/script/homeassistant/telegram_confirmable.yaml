blueprint:
  name: Telegram Confirmable Notification
  description: >-
    Send a Telegram message with inline Confirm/Dismiss buttons and run an action
    based on which the user taps. The "unsure -> ask" call-to-action primitive.
  domain: script
  input:
    target_chat:
      name: Target chat id
      description: Telegram chat id to send to (e.g. !secret telegram_chat_id).
      selector:
        text:
    message:
      name: Message
      selector:
        text:
    confirm_text:
      name: Confirm button text
      default: "Confirm"
      selector:
        text:
    dismiss_text:
      name: Dismiss button text
      default: "Dismiss"
      selector:
        text:
    confirm_action:
      name: Confirm action
      default: []
      selector:
        action:
    dismiss_action:
      name: Dismiss action
      default: []
      selector:
        action:
    timeout_hours:
      name: Timeout (hours)
      default: 1
      selector:
        number:
          min: 0
          max: 24
          mode: box

mode: restart

sequence:
  - alias: "Set up callback tokens"
    variables:
      token_confirm: "CONFIRM_{{ context.id }}"
      token_dismiss: "DISMISS_{{ context.id }}"
      confirm_label: !input confirm_text
      dismiss_label: !input dismiss_text
  - alias: "Send Telegram message with inline buttons"
    service: telegram_bot.send_message
    # Capture the sent message so we can edit it later (strip buttons / show outcome),
    # including on timeout when no callback (and thus no message id) ever arrives.
    response_variable: sent
    data:
      chat_id: !input target_chat
      message: !input message
      # The "text:/data" shorthand makes HA set callback_data to "/" + data, so the
      # delivered telegram_callback data is "/CONFIRM_…" / "/DISMISS_…" (leading slash).
      # The wait + conditions below match that exact "/"-prefixed value. No space after
      # the comma, else the 2nd button text gets a leading space.
      inline_keyboard:
        - "{{ confirm_label }}:/{{ token_confirm }},{{ dismiss_label }}:/{{ token_dismiss }}"
  - alias: "Remember the sent message (for timeout cleanup)"
    variables:
      sent_chat: "{{ sent.chats[0].chat_id }}"
      sent_msg: "{{ sent.chats[0].message_id }}"
  - alias: "Await the button press"
    wait_for_trigger:
      - trigger: event
        event_type: telegram_callback
        event_data:
          data: "/{{ token_confirm }}"
      - trigger: event
        event_type: telegram_callback
        event_data:
          data: "/{{ token_dismiss }}"
    timeout:
      hours: !input timeout_hours
  - alias: "Acknowledge + act, or note timeout — then remove the now-stale buttons"
    if:
      - condition: template
        value_template: "{{ wait.trigger is not none }}"
    then:
      - service: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ wait.trigger.event.data.id }}"
          message: "Got it"
      - variables:
          picked: >-
            {{ confirm_label if wait.trigger.event.data.data == '/' ~ token_confirm
               else dismiss_label }}
      - choose:
          - conditions: "{{ wait.trigger.event.data.data == '/' ~ token_confirm }}"
            sequence: !input confirm_action
          - conditions: "{{ wait.trigger.event.data.data == '/' ~ token_dismiss }}"
            sequence: !input dismiss_action
      # Edit the original message: append the choice and drop the keyboard (omitting
      # inline_keyboard removes it), so the buttons can't be tapped again.
      - service: telegram_bot.edit_message
        data:
          message_id: "{{ wait.trigger.event.data.message.message_id }}"
          chat_id: "{{ wait.trigger.event.data.chat_id }}"
          message: "{{ wait.trigger.event.data.message.text }}\n\n✅ {{ picked }}"
    else:
      - service: telegram_bot.edit_message
        data:
          message_id: "{{ sent_msg }}"
          chat_id: "{{ sent_chat }}"
          message: "⌛ This request expired with no response — ignored."
