services:

  # ─── Home Assistant ──────────────────────────────────────────────────────────
  # No privileged / devices: this HA has zero local-hardware integrations. Zigbee
  # is owned by the zigbee2mqtt container (it holds the USB dongle); everything else
  # is networked (Qingping/Xiaomi over Wi-Fi+MQTT, fans over Broadlink RF, boiler
  # over LocalTuya). The only host access HA needs is the two read-only mounts below
  # (/run/dbus, /sys/class/power_supply). Re-add privileged only if a future
  # integration needs direct USB/BT access.
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
      - /sys/class/power_supply:/sys/class/power_supply:ro
      - /mnt/nas/ha:/config/backups
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8123/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      mosquitto:
        condition: service_healthy

  # ─── Zigbee2MQTT ─────────────────────────────────────────────────────────────
  # Inactive until dongle arrives. Start with:
  #   docker compose --profile zigbee up -d
  # After first start, back up zigbee2mqtt/data/ — it contains the network key.
  # When the dongle is plugged in, confirm the serial path with:
  #   ls /dev/serial/by-id/
  # then remove `profiles` so it starts automatically on boot.
  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt:latest
    # z2m REWRITES configuration.yaml at runtime (device pairings, renames), so the
    # config lives inside data/ rather than a separate tracked config/ file. data/ is
    # gitignored and NAS-backed by the 04:00 cron; a tracked config here caused constant
    # working-tree drift and git-pull collisions on every pairing. To recreate the live
    # config on a fresh host, restore data/ from the NAS backup.
    volumes:
      - ./zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      - /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0:/dev/ttyUSB0
    ports:
      - "8099:8099"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8099/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mosquitto:
        condition: service_healthy

  # ─── Mosquitto MQTT Broker ───────────────────────────────────────────────────
  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2.0
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # MQTT over WebSockets
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/uptime' -C 1 -W 2 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── MQTT Explorer ────────────────────────────────────────────────────────────
  # Web UI for inspecting MQTT topics. Auth disabled — LAN only.
  mqtt-explorer:
    container_name: mqtt-explorer
    image: ghcr.io/thomasnordquist/mqtt-explorer:latest
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MQTT_EXPLORER_SKIP_AUTH=true
    # Container runs as UID 1001 — host ./mqtt-explorer/data MUST be owned 1001:1001
    # (chown -R 1001:1001 mqtt-explorer/data) or it silently fails to persist
    # settings.json/credentials.json and loses the broker connection on every refresh.
    # The gathered topic tree is browser-side only — not cached here.
    volumes:
      - ./mqtt-explorer/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Node-RED ─────────────────────────────────────────────────────────────────
  nodered:
    container_name: nodered
    image: nodered/node-red:latest
    volumes:
      - ./nodered/data:/data
    ports:
      - "1880:1880"
    restart: unless-stopped
    environment:
      - TZ=America/New_York  # Change to your timezone
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:1880/ 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── ESPHome ──────────────────────────────────────────────────────────────────
  # Uses host networking so it can discover ESP devices via mDNS.
  # Dashboard is available at http://<host-ip>:6052
  # privileged: true is required for USB serial access when flashing ESP devices
  # directly from this host. If you never flash over USB, you can remove it and
  # instead add only the specific device under `devices:` (e.g. /dev/ttyUSB0).
  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:stable
    volumes:
      - ./esphome/config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6052/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Portainer (Docker Management UI) ────────────────────────────────────────
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:2.21.5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    ports:
      - "9000:9000"
      - "9443:9443"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ═══════════════════════════════════════════════════════════════════════════════
  # Monitoring Stack — Prometheus + Grafana + Exporters
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.2.1
    volumes:
      - ./prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/data:/prometheus
      # Dedicated non-admin HA monitoring token (gitignored) for the /api/prometheus
      # scrape job. Must be readable by the prometheus container UID (65534).
      - ./prometheus/secrets:/etc/prometheus/secrets:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    # HA is host-networked on :8123; reach it from this bridge container via the
    # host gateway (the "homeassistant" scrape target in prometheus.yml).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      node-exporter:
        condition: service_healthy
      cadvisor:
        condition: service_healthy

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    container_name: grafana
    image: grafana/grafana-oss:11.6.0
    entrypoint: ["/bin/sh", "/grafana-entrypoint.sh"]
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ./grafana/grafana-entrypoint.sh:/grafana-entrypoint.sh:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"   # allows reaching HA webhook at host:8123
    env_file: .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_PATHS_PROVISIONING=/tmp/grafana-provisioning
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy

  # ─── Node Exporter (host metrics) ───────────────────────────────────────────
  # Exposes CPU, memory, disk, and network metrics from the Docker host.
  # Also reads /var/lib/node_exporter/textfile_collector/ for custom metrics
  # (e.g. ThinkPad battery status written by ha-battery-mqtt.sh).
  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:v1.9.0
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/lib/node_exporter:/var/lib/node_exporter:ro
    ports:
      - "9100:9100"
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
      # Ignore BAT0: reading its phantom charge-threshold sysfs files spams the
      # kernel log (~24/min thinkpad_acpi BCSG/BCTG AE_NOT_FOUND on the T400 EC).
      # BAT0 health (Wh) is republished via the textfile collector (see setup.sh
      # §3b/§6). AC stays included for outage detection.
      - "--collector.powersupply.ignored-supplies=^BAT0$$"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── cAdvisor (Docker container metrics) ────────────────────────────────────
  # Exposes per-container CPU, memory, network, and I/O metrics.
  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
