services:

  # ─── Home Assistant ──────────────────────────────────────────────────────────
  # privileged: true is recommended by the upstream project to allow HA access to
  # Bluetooth adapters, USB Z-Wave/Zigbee sticks, and other hardware. If you only
  # use network-based integrations you can remove it and add specific `devices:`
  # entries instead.
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
      - /sys/class/power_supply:/sys/class/power_supply:ro
      - /mnt/nas/ha:/backup
    restart: unless-stopped
    privileged: true
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8123/api/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      mosquitto:
        condition: service_healthy

  # ─── Mosquitto MQTT Broker ───────────────────────────────────────────────────
  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2.0
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # MQTT over WebSockets
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/uptime' -C 1 -W 2 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Node-RED ─────────────────────────────────────────────────────────────────
  nodered:
    container_name: nodered
    image: nodered/node-red:latest
    volumes:
      - ./nodered/data:/data
    ports:
      - "1880:1880"
    restart: unless-stopped
    environment:
      - TZ=America/New_York  # Change to your timezone
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:1880/ 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── ESPHome ──────────────────────────────────────────────────────────────────
  # Uses host networking so it can discover ESP devices via mDNS.
  # Dashboard is available at http://<host-ip>:6052
  # privileged: true is required for USB serial access when flashing ESP devices
  # directly from this host. If you never flash over USB, you can remove it and
  # instead add only the specific device under `devices:` (e.g. /dev/ttyUSB0).
  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:stable
    volumes:
      - ./esphome/config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6052/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Portainer (Docker Management UI) ────────────────────────────────────────
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:2.21.5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    ports:
      - "9000:9000"
      - "9443:9443"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ═══════════════════════════════════════════════════════════════════════════════
  # Monitoring Stack — Prometheus + Grafana + Exporters
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.2.1
    volumes:
      - ./prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      node-exporter:
        condition: service_healthy
      cadvisor:
        condition: service_healthy

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    container_name: grafana
    image: grafana/grafana-oss:11.6.0
    entrypoint: ["/bin/sh", "/grafana-entrypoint.sh"]
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ./grafana/grafana-entrypoint.sh:/grafana-entrypoint.sh:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"   # allows reaching HA webhook at host:8123
    env_file: .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_PATHS_PROVISIONING=/tmp/grafana-provisioning
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy

  # ─── Node Exporter (host metrics) ───────────────────────────────────────────
  # Exposes CPU, memory, disk, and network metrics from the Docker host.
  # Also reads /var/lib/node_exporter/textfile_collector/ for custom metrics
  # (e.g. ThinkPad battery status written by ha-battery-mqtt.sh).
  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:v1.9.0
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/lib/node_exporter:/var/lib/node_exporter:ro
    ports:
      - "9100:9100"
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── cAdvisor (Docker container metrics) ────────────────────────────────────
  # Exposes per-container CPU, memory, network, and I/O metrics.
  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
