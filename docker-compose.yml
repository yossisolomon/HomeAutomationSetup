services:

  # ─── Home Assistant ──────────────────────────────────────────────────────────
  # privileged: true is recommended by the upstream project to allow HA access to
  # Bluetooth adapters, USB Z-Wave/Zigbee sticks, and other hardware. If you only
  # use network-based integrations you can remove it and add specific `devices:`
  # entries instead.
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
      - /sys/class/power_supply:/sys/class/power_supply:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    depends_on:
      - mosquitto

  # ─── Mosquitto MQTT Broker ───────────────────────────────────────────────────
  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2.0
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # MQTT over WebSockets
    restart: unless-stopped

  # ─── Node-RED ─────────────────────────────────────────────────────────────────
  nodered:
    container_name: nodered
    image: nodered/node-red:4
    volumes:
      - ./nodered/data:/data
    ports:
      - "1880:1880"
    restart: unless-stopped
    environment:
      - TZ=America/New_York  # Change to your timezone

  # ─── ESPHome ──────────────────────────────────────────────────────────────────
  # Uses host networking so it can discover ESP devices via mDNS.
  # Dashboard is available at http://<host-ip>:6052
  # privileged: true is required for USB serial access when flashing ESP devices
  # directly from this host. If you never flash over USB, you can remove it and
  # instead add only the specific device under `devices:` (e.g. /dev/ttyUSB0).
  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:stable
    volumes:
      - ./esphome/config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    network_mode: host

  # ─── Portainer (Docker Management UI) ────────────────────────────────────────
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:2.21.5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    ports:
      - "9000:9000"
      - "9443:9443"
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════════
  # Monitoring Stack — Prometheus + Grafana + Exporters
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.2.1
    volumes:
      - ./prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - node-exporter
      - cadvisor

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    container_name: grafana
    image: grafana/grafana-oss:11.6.0
    volumes:
      - ./grafana/data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}   # Override in .env
    depends_on:
      - prometheus

  # ─── Node Exporter (host metrics) ───────────────────────────────────────────
  # Exposes CPU, memory, disk, and network metrics from the Docker host.
  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:v1.9.0
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  # ─── cAdvisor (Docker container metrics) ────────────────────────────────────
  # Exposes per-container CPU, memory, network, and I/O metrics.
  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
