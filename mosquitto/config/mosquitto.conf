# Mosquitto MQTT Broker Configuration

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Listener on standard MQTT port
listener 1883

# Listener for MQTT over WebSockets (used by the Home Assistant UI, Node-RED, etc.)
listener 9001
protocol websockets

# Allow connections without authentication (development only).
# For production, comment out the line below and configure a password file:
#   password_file /mosquitto/config/passwd
allow_anonymous true
