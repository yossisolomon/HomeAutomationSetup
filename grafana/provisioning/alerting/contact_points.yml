apiVersion: 1

# Contact points for Grafana alerting.
# After any change here: docker compose restart grafana

contactPoints:
  - orgId: 1
    name: blacky-notify
    receivers:

      # ── Telegram ─────────────────────────────────────────────────────────────
      - uid: telegram
        type: telegram
        settings:
          bottoken: "${TELEGRAM_BOT_TOKEN}"
          chatid: "${TELEGRAM_CHAT_ID}"
          message: |
            {{ range .Alerts }}
            🚨 {{ .Labels.severity | toUpper }}: {{ .Annotations.summary }}
            {{ end }}

      # ── Home Assistant webhook ────────────────────────────────────────────────
      # Uncomment when HA webhook automation is configured:
      # - uid: ha_webhook
      #   type: webhook
      #   settings:
      #     url: http://host.docker.internal:8123/api/webhook/<WEBHOOK_ID>
      #     httpMethod: POST

policies:
  - orgId: 1
    receiver: blacky-notify
    group_by: [alertname, severity]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
