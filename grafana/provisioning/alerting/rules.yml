apiVersion: 1

groups:
  - orgId: 1
    name: blacky-system
    folder: System Alerts
    interval: 1m
    rules:

      # ── CPU ──────────────────────────────────────────────────────────────────
      - uid: blacky_cpu_high
        title: "High CPU Usage (>85%)"
        condition: threshold
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: '100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)'
              instant: true
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator: {type: gt, params: [85]}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "CPU usage above 85% for 5 minutes on blacky"
        labels:
          severity: warning
        isPaused: false

      # ── RAM ───────────────────────────────────────────────────────────────────
      - uid: blacky_ram_high
        title: "High Memory Usage (>90%)"
        condition: threshold
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: '(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100'
              instant: true
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator: {type: gt, params: [90]}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Memory usage above 90% for 5 minutes on blacky"
        labels:
          severity: warning
        isPaused: false

      # ── Disk (per partition) ─────────────────────────────────────────────────
      - uid: blacky_disk_high
        title: "High Disk Usage (>85%)"
        condition: threshold
        data:
          - refId: A
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: prometheus
            model:
              expr: '(1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|devtmpfs",mountpoint!~"/boot|/run"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs|devtmpfs",mountpoint!~"/boot|/run"}) * 100'
              instant: true
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator: {type: gt, params: [85]}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: "Disk usage above 85% on {{ $labels.mountpoint }} for 10 minutes"
        labels:
          severity: warning
        isPaused: false

      # ── Home Assistant down ─────────────────────────────────────────────────
      # up{job="homeassistant"} is Prometheus's synthetic scrape-success metric for
      # the HA /api/prometheus job (see prometheus.yml). It is 1 when HA answers the
      # scrape and 0 when HA is down / wedged / returns an error — a true API-readiness
      # signal, independent of CD (which alerts on deploy failures). Routes to the
      # existing blacky-notify Telegram contact point.
      - uid: blacky_ha_down
        title: "Home Assistant Down"
        condition: threshold
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: 'up{job="homeassistant"}'
              instant: true
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator: {type: lt, params: [1]}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
        noDataState: Alerting
        execErrState: Error
        for: 2m
        annotations:
          summary: "Home Assistant unreachable (/api/prometheus scrape failing) for 2 minutes"
        labels:
          severity: critical
        isPaused: false

      # ── Battery ───────────────────────────────────────────────────────────────
      # Sourced from node_exporter textfile collector written by ha-battery-metrics.sh
      # NOTE: thinkpad_battery_capacity_percent is the LIVE fuel-gauge reading and on
      # this aged pack is unreliable — it can freeze high (remaining_percent_error ≈ 25)
      # for weeks while real charge drains. The rules below that read it (<20/<10) are
      # ADVISORY only. The trustworthy charge reading is thinkpad_battery_gauge_refresh_percent,
      # produced once a day by battery-gauge-refresh.sh (setup.sh §3d) forcing a short charge.
      - uid: blacky_battery_low
        title: "Low Battery (<20%)"
        condition: threshold
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: 'thinkpad_battery_capacity_percent'
              instant: true
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator: {type: lt, params: [20]}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
        noDataState: OK
        execErrState: OK
        for: 2m
        annotations:
          summary: "ThinkPad battery below 20% — consider plugging in"
        labels:
          severity: warning
        isPaused: false

      - uid: blacky_battery_critical
        title: "Critical Battery (<10%)"
        condition: threshold
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: 'thinkpad_battery_capacity_percent'
              instant: true
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator: {type: lt, params: [10]}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
        noDataState: OK
        execErrState: OK
        for: 1m
        annotations:
          summary: "ThinkPad battery critically low (<10%) — imminent shutdown risk"
        labels:
          severity: critical
        isPaused: false

      # True charge revealed by the daily forced-charge probe (the trustworthy reading).
      # This is the alert that would have caught the silent drain weeks earlier.
      - uid: blacky_battery_true_low
        title: "Battery truly low (daily probe <40%)"
        condition: threshold
        data:
          - refId: A
            relativeTimeRange: {from: 86400, to: 0}
            datasourceUid: prometheus
            model:
              expr: 'thinkpad_battery_gauge_refresh_percent'
              instant: true
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator: {type: lt, params: [40]}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
        noDataState: OK
        execErrState: OK
        for: 0m
        annotations:
          summary: "Daily gauge-refresh shows the pack is actually <40% — real charge is low (live gauge is unreliable)"
        labels:
          severity: warning
        isPaused: false

      # The daily refresh job stopped running (>48h since last successful probe).
      - uid: blacky_gauge_refresh_stale
        title: "Battery gauge-refresh stale (>48h)"
        condition: threshold
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: 'time() - thinkpad_battery_gauge_refresh_timestamp_seconds'
              instant: true
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator: {type: gt, params: [172800]}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
        noDataState: Alerting
        execErrState: OK
        for: 0m
        annotations:
          summary: "battery-gauge-refresh has not run in >48h — daily true-% probe is stale"
        labels:
          severity: warning
        isPaused: false

      # Pack degradation: current full-charge capacity vs design (Wh). ~82% now.
      - uid: blacky_battery_health_low
        title: "Battery health low (<50% of design Wh)"
        condition: threshold
        data:
          - refId: A
            relativeTimeRange: {from: 3600, to: 0}
            datasourceUid: prometheus
            model:
              expr: 'thinkpad_battery_energy_full_wh / thinkpad_battery_energy_full_design_wh * 100'
              instant: true
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator: {type: lt, params: [50]}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
        noDataState: OK
        execErrState: OK
        for: 1h
        annotations:
          summary: "ThinkPad battery health <50% of design capacity — UPS runtime degraded, plan replacement"
        labels:
          severity: warning
        isPaused: false
